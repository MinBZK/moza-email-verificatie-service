rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=user
rabbitmq-password=password

# Configuration for the verification requests incoming channel
mp.messaging.incoming.verification-requests-in.connector=smallrye-rabbitmq
mp.messaging.incoming.verification-requests-in.queue.name=verification-requests
mp.messaging.incoming.verification-requests-in.exchange.name=verification-requests
mp.messaging.incoming.verification-requests-in.failure-strategy=reject

# Configuration for the verification requests outgoing channel
mp.messaging.outgoing.verification-requests-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.verification-requests-out.exchange.name=verification-requests

verification.code.validity-minutes=10
verification.cleanup.schedule=60s

quarkus.hibernate-orm.schema-management.strategy=none
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%prod.quarkus.hibernate-orm.schema-management.strategy=update

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.max-size=16
quarkus.datasource.username=user
quarkus.datasource.password=password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/verificatieservice

#NotifyNL properties
notifynl.emailverificatie.url=
notifynl.emailverificatie.api-key=
notifynl.emailverificatie.template-id=