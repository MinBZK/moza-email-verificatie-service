quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test

quarkus.scheduler.enabled=false

# Overriding retry settings for VerificationRequestHandler for fast tests
nl.rijksoverheid.moz.consumer.VerificationRequestHandler/consume/Retry/delay=10
nl.rijksoverheid.moz.consumer.VerificationRequestHandler/consume/Retry/delayUnit=Millis
nl.rijksoverheid.moz.consumer.VerificationRequestHandler/consume/ExponentialBackoff/maxDelay=100
nl.rijksoverheid.moz.consumer.VerificationRequestHandler/consume/ExponentialBackoff/maxDelayUnit=Millis